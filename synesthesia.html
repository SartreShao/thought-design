<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibit 03: Synesthesia - Audio Visualizer</title>
    <link rel="stylesheet" href="synesthesia.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <a href="index.html" class="back-link">← Return to Museum</a>

    <div id="ui-layer">
        <div class="title-container">
            <h1 id="art-title">SYNESTHESIA</h1>
            <p id="art-subtitle">The Geometry of Sound</p>
        </div>

        <div class="audio-controls">
            <label for="audio-upload" class="upload-btn">
                <span>Select MP3 / WAV</span>
                <input type="file" id="audio-upload" accept="audio/*">
            </label>
            <div id="now-playing" class="hidden">Now Playing: <span id="track-name"></span></div>
            <audio id="audio-player" controls class="hidden"></audio>
        </div>
    </div>

    <!-- WebGL Canvas -->
    <div id="canvas-container"></div>

    <script src="synesthesia.js"></script>
</body>
</html>
