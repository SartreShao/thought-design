<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Digital Art Museum</title>
    <link rel="stylesheet" href="gallery.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gallery-container">
        
        <header class="museum-header">
            <div class="logo">AG</div>
            <div class="subtitle">THE DIGITAL ART MUSEUM</div>
        </header>

        <main class="exhibitions">
            <div class="exhibit-list">
                
                <a href="math-art.html" class="exhibit-item" data-bg="bg-math">
                    <span class="exhibit-number">02</span>
                    <div class="exhibit-title">
                        <h2>Sacred Geometry</h2>
                        <span class="exhibit-tag">WebGL / Mathematics</span>
                    </div>
                    <div class="exhibit-year">2026</div>
                </a>

                <a href="lumina-fluid.html" class="exhibit-item" data-bg="bg-fluid">
                    <span class="exhibit-number">01</span>
                    <div class="exhibit-title">
                        <h2>Lumina Fluid</h2>
                        <span class="exhibit-tag">Generative CSS / SVG</span>
                    </div>
                    <div class="exhibit-year">2026</div>
                </a>

            </div>
        </main>

        <footer class="museum-footer">
            <p>Curated by Antigravity AI.</p>
        </footer>

        <!-- Ambient Background Layer for hover effects -->
        <div class="ambient-background" id="ambient-bg"></div>
    </div>

    <script src="gallery.js"></script>
</body>
</html>
